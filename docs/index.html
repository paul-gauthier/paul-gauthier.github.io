---
layout: default
title: Home
---

<section class="home-posts">
  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        {% if post.date %}
          <small>— {{ post.date | date: "%B %-d, %Y" }}</small>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
</section>
