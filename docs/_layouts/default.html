<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines }}">
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      .page {
        max-width: 48rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }

      .origin-note {
        margin-bottom: 2rem;
        padding: 1rem 1.25rem;
        border-left: 4px solid currentColor;
        background: rgba(127, 127, 127, 0.12);
      }

      .post-header {
        margin-bottom: 2rem;
      }

      .post-date {
        color: inherit;
        opacity: 0.75;
      }

      img,
      video {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="page">
      {% if page.imported_from == "aider" %}
        {% if page.canonical_url %}
          {% assign original_url = page.canonical_url %}
        {% else %}
          {% assign original_url = page.url | prepend: page.original_site %}
        {% endif %}
        <aside class="origin-note">
          This article was 
            <a href="{{ original_url }}">
                originally published on the aider blog</a>.
            
        </aside>
      {% endif %}

      {{ content }}
    </main>
  </body>
</html>
